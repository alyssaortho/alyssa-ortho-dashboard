<script>
const {useState,useEffect,useCallback,createElement:h,Fragment}=React;
const {BarChart,Bar,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,ReferenceLine,PieChart,Pie,Cell}=Recharts;

const SHEET_ID="1wXf0BklqmjDn5Lswrg-B6-cHVeFCv-qUkFdFvj40-W8";
const SHEET_TABS=[
  {key:"January",tab:"Jan '26",hasBonham:false},
  {key:"February",tab:"Feb '26",hasBonham:false},
  {key:"March",tab:"March '26",hasBonham:false},
  {key:"April",tab:"April '26",hasBonham:false},
  {key:"May",tab:"May '26",hasBonham:true},
  {key:"June",tab:"Jun '26",hasBonham:true},
  {key:"July",tab:"Jul '26",hasBonham:true},
  {key:"August",tab:"Aug '26",hasBonham:true},
  {key:"September",tab:"Sep '26",hasBonham:true},
  {key:"October",tab:"Oct '26",hasBonham:true},
  {key:"November",tab:"Nov '26",hasBonham:true},
  {key:"December",tab:"Dec '26",hasBonham:true},
];
const MONTH_KEYS=SHEET_TABS.map(s=>s.key);
const C={bg:"#EDF2F7",panel:"#FFFFFF",panelAlt:"#F0F4F9",border:"#C9D6E3",royal:"#003087",blue:"#1a5fba",orange:"#E05A00",silver:"#718096",white:"#FFFFFF",teal:"#00BCD4",green:"#1a9e7a",text:"#1A202C",subtext:"#2D3748",muted:"#718096",purple:"#9B27AF"};
const F="'Trebuchet MS','Century Gothic',sans-serif";

const pct=v=>{if(!v)return null;const s=String(v).trim();if(s==="-"||s==="—"||s==="")return null;const n=parseFloat(s.replace("%",""));return isNaN(n)?null:n;};
const num=v=>{if(!v)return null;const s=String(v).trim();if(s==="-"||s==="")return null;const n=parseInt(s.replace(/[^0-9.-]/g,""));return isNaN(n)?null:n;};
const norm=s=>String(s||"").trim().toLowerCase().replace(/\s+/g," ");
const accent=(v,g)=>v===100?C.purple:(!g||v>=g?C.blue:C.orange);
const stxt=(v,g)=>{if(!g||v==null)return null;const d=(v-g).toFixed(1);return v>=g?`+${d}% above goal`:`${d}% below goal`;};

function parseCSV(text){
  const rows=[],row=[];let cur="",inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(c==='"'){if(inQ&&text[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
    else if(c===','&&!inQ){row.push(cur);cur="";}
    else if((c==='\n'||c==='\r')&&!inQ){
      row.push(cur);cur="";
      if(row.some(x=>x.trim()))rows.push([...row]);
      row.length=0;
      if(c==='\r'&&text[i+1]==='\n')i++;
    }else cur+=c;
  }
  if(row.length){row.push(cur);if(row.some(x=>x.trim()))rows.push(row);}
  return rows;
}

// Use JSONP-style Google Sheets visualization API to bypass CORS
function fetchSheet(tabName){
  return new Promise((resolve)=>{
    const callbackName='cb_'+Math.random().toString(36).slice(2);
    const script=document.createElement('script');
    const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&tq=select+N,O&sheet=${encodeURIComponent(tabName)}&callback=${callbackName}`;
    let done=false;
    window[callbackName]=(data)=>{
      done=true;
      delete window[callbackName];
      script.remove();
      try{
        // Parse the Google Visualization JSON response
        const rows=data.table.rows;
        // Convert to CSV-like array: each row has cols[13]=N, cols[14]=O
        // But since we only selected N,O the indices are 0 and 1
        const result=rows.map(r=>{
          const n=r.c&&r.c[0]?String(r.c[0].v||""):"";
          const o=r.c&&r.c[1]?String(r.c[1].v||""):"";
          return {label:n.trim(),value:o.trim()};
        }).filter(r=>r.label);
        resolve(result);
      }catch(e){resolve(null);}
    };
    script.onerror=()=>{done=true;delete window[callbackName];script.remove();resolve(null);};
    setTimeout(()=>{if(!done){delete window[callbackName];script.remove();resolve(null);}},8000);
    script.src=url;
    document.head.appendChild(script);
  });
}

function extractMonthData(labelList,hasBonham){
  const labelMap={};
  labelList.forEach(({label,value})=>{const k=norm(label);if(!labelMap[k])labelMap[k]=value;});
  const get=(...cs)=>{
    for(const c of cs){const v=labelMap[norm(c)];if(v!=null)return v;}
    for(const c of cs){
      const words=norm(c).split(" ").filter(w=>w.length>4);if(!words.length)continue;
      const k=Object.keys(labelMap).find(k=>words.every(w=>k.includes(w)));if(k)return labelMap[k];
    }
    return null;
  };
  const TC_DEFS=[{name:"Alex",short:"Alex"},{name:"Sandra Diaz",short:"S.Diaz"},{name:"Sandra Stevens",short:"S.Stevens"},{name:"Ana Ferreria",short:"Ana"},{name:"Maricssa DelToro",short:"Maricssa"}];
  const TC_NAMES=TC_DEFS.map(t=>t.name);
  const tcSds=[],tcTrc=[],tcTable=[];
  TC_DEFS.forEach(({name,short})=>{
    const hdrIdx=labelList.findIndex((r,i)=>norm(r.label)===norm(name)&&(r.value===""||r.value==null)&&i>0);
    if(hdrIdx===-1)return;
    let rec=null,started=null,sdsVal=null,trcVal=null,eom=0,firstConv=false;
    for(let j=hdrIdx+1;j<Math.min(hdrIdx+20,labelList.length);j++){
      const lbl=norm(labelList[j].label),val=labelList[j].value;
      if(TC_NAMES.some(n=>norm(n)===lbl&&labelList[j].value===""))break;
      if(lbl==="total recommended treatment"||lbl==="total recommended treatment ")rec=num(val);
      else if(lbl==="tx started total")started=num(val);
      else if(lbl==="sds conversion %"||lbl==="sds conversion")sdsVal=pct(val);
      else if(lbl==="conversion %"&&!firstConv){sdsVal=pct(val);firstConv=true;}
      else if(lbl==="trc conversion %"||lbl==="trc conversion")trcVal=pct(val);
      else if(lbl.includes("patients converted by eom"))eom=num(val)||0;
    }
    if(rec!==null||started!==null){
      tcSds.push({tc:name,label:short,value:sdsVal??0,goal:50});
      tcTrc.push({tc:name,label:short,value:trcVal??0,goal:70});
      tcTable.push({name,short,rec:rec??0,started:started??0,sds:sdsVal!=null?`${sdsVal.toFixed(1)}%`:"—",eom,trc:trcVal??0});
    }
  });
  const remote=[];
  ["DENISON","GAINESVILLE"].forEach(locU=>{
    const loc=locU.charAt(0)+locU.slice(1).toLowerCase();
    const hdrIdx=labelList.findIndex(r=>norm(r.label).includes("remote conversion")&&norm(r.label).includes(locU.toLowerCase()));
    if(hdrIdx===-1)return;
    let lRec=null,lStart=null,lConv=null;
    for(let j=hdrIdx+1;j<Math.min(hdrIdx+5,labelList.length);j++){
      const lbl=norm(labelList[j].label),val=labelList[j].value;
      if(lbl.includes("total remote exams recommended"))lRec=num(val);
      else if(lbl.includes("remote exams started"))lStart=num(val);
      else if(lbl==="conversion %"&&lConv==null)lConv=pct(val);
    }
    remote.push({location:loc,recommended:lRec??0,started:lStart??0,conversion:lConv??0,goal:70});
  });
  return{
    examKeptAll:pct(get("Exam Kept Rate (All) Both Locations Kept/(Kept+Not Kept)","Exam Kept Rate (All) All Locations Kept/(Kept+Not Kept)")),
    examKeptResched:pct(get("Exam Kept Rate with Reschedules within Same Month")),
    totalNewExams:num(get("Total Number of New Exams")),
    newExamKeptAll:pct(get("New Exam Kept Rate (Both Locations)","New Exam Kept Rate (All Locations)")),
    newExamKeptDenison:pct(get("New Exam Kept Rate - Denison")),
    newExamKeptGainesville:pct(get("New Exam Kept Rate  Gainesville","New Exam Kept Rate - Gainesville")),
    newExamKeptBonham:hasBonham?pct(get("New Exam Kept Rate - Bonham")):null,
    obsKeptAll:pct(get("All OBSERVATION Kept Rate OBS/RR/P2 (Both Locations)","All OBSERVATION Kept Rate OBS/RR/P2 (All Locations)")),
    obsKeptDenison:pct(get("All OBSERVATION Kept Rate OBS/RR/P2 - Denison")),
    obsKeptGainesville:pct(get("All OBSERVATION Kept Rate OBS/RR/P2- Gainesville","All OBSERVATION Kept Rate OBS/RR/P2 - Gainesville")),
    obsKeptBonham:hasBonham?pct(get("All OBSERVATION Kept Rate OBS/RR/P2 - Bonham","All OBSERVATION Kept Rate OBS/RR/P2- Bonham")):null,
    sdsTotal:pct(get("Same Day Conversion (Both Locations)","Same Day Conversion (All Locations)")),sdsGoal:50,
    totalSameDay:num(get("Total Same Day Starts (Both Locations)","Total Same Day Starts (All Locations)")),
    denStarts:num(get("Total Same Day Starts - Denison")),gainStarts:num(get("Total Same Day Starts - Gainesville")),
    bonStarts:hasBonham?num(get("Total Same Day Starts - Bonham")):null,
    eomTotal:pct(get("EOM TRC ALL EXAMS (Both Locations)","EOM TRC ALL EXAMS (All Locations)")),eomTotalGoal:70,
    eomNewDenison:pct(get("EOM New Exams - Denison")),eomNewGainesville:pct(get("EOM New Exams - Gainesville")),
    eomNewBonham:hasBonham?pct(get("EOM New Exams - Bonham")):null,
    eomObsDenison:pct(get("EOM OBS (OBS/RR/P2) - Denison")),eomObsGainesville:pct(get("EOM OBS (OBS/RR/P2) - Gainesville")),

        h('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}},h(KpiCard,{label:"Exam Show Rate — All",value:d.examKeptAll}),h(KpiCard,{label:"Exam Kept w/ Reschedules",value:d.examKeptResched,goal:85})),
        h('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}},
          h(KpiCard,{label:"New Exam Kept — All",value:d.newExamKeptAll,goal:85}),
          h('div',{style:{display:"flex",flexDirection:"column",gap:8}},
            h(MetricTile,{label:"New Exam Kept — Denison",value:d.newExamKeptDenison,goal:85}),
            h(MetricTile,{label:"New Exam Kept — Gainesville",value:d.newExamKeptGainesville,goal:85}),
            d.hasBonham&&h(MetricTile,{label:"New Exam Kept — Bonham",value:d.newExamKeptBonham,goal:85})
          )
        ),
        h('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:28}},
          h(KpiCard,{label:"OBS Kept — All",value:d.obsKeptAll,goal:85}),
          h('div',{style:{display:"flex",flexDirection:"column",gap:8}},
            h(MetricTile,{label:"OBS Kept — Denison",value:d.obsKeptDenison,goal:85}),
            h(MetricTile,{label:"OBS Kept — Gainesville",value:d.obsKeptGainesville,goal:85}),
            d.hasBonham&&h(MetricTile,{label:"OBS Kept — Bonham",value:d.obsKeptBonham,goal:85})
          )
        ),
        h('div',{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:20}},
          h(Donut,{data:[{name:"New Exams",value:d.totalNewCompleted??0,color:C.blue},{name:"OBS/RR/P2",value:d.totalObsCompleted??0,color:C.teal}],title:"TOTAL APPTS COMPLETED"}),
          h(Donut,{data:[{name:"Converted",value:d.newConverted??0,color:C.green},{name:"Pending",value:d.newPending??0,color:C.orange},{name:"Into OBS",value:d.newIntoObs??0,color:C.silver}],title:"NEW EXAM OUTCOMES"}),
          h(Donut,{data:[{name:"Converted",value:d.obsConverted??0,color:C.green},{name:"Pending",value:d.obsPending??0,color:C.orange},{name:"Stayed OBS",value:d.obsStayed??0,color:C.silver}],title:"OBS / RR / P2 OUTCOMES"})
        )
      ),
      section==="trends"&&h('div',null,
        h(SH,{label:"Year-to-Date Trends",color:C.teal,month:"2026"}),
        h('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:18,marginBottom:22}},
          h(TrendBar,{allData,metricKey:"totalSameDay",goal:null,label:"SAME DAY STARTS",isCount:true}),
          h(TrendBar,{allData,metricKey:"sdsTotal",goal:50,label:"SDS%"}),
          h(TrendBar,{allData,metricKey:"eomTotal",goal:70,label:"EOM TRC TOTAL"}),
          h(TrendBar,{allData,metricKey:"eomNewDenison",goal:70,label:"EOM NEW — DENISON"}),
          h(TrendBar,{allData,metricKey:"eomNewGainesville",goal:70,label:"EOM NEW — GAINESVILLE"}),
          h(TrendBar,{allData,metricKey:"eomObsAll",goal:70,label:"EOM OBS TOTAL"}),
          h(TrendBar,{allData,metricKey:"examKeptResched",goal:85,label:"EXAM KEPT W/ RESCHED"}),
          h(TrendBar,{allData,metricKey:"totalNewExams",goal:null,label:"TOTAL NEW EXAMS",isCount:true}),
          h(TrendBar,{allData,metricKey:"newExamKeptAll",goal:85,label:"NEW EXAM KEPT"}),
          h(TrendBar,{allData,metricKey:"obsKeptAll",goal:85,label:"OBS KEPT"})
        ),
        h('div',{style:{background:C.panel,border:`1px solid ${C.border}`,borderRadius:10,padding:"22px 26px",boxShadow:"0 2px 8px rgba(0,48,135,0.07)"}},
          h('p',{style:{color:C.subtext,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.12em",margin:"0 0 14px",fontFamily:F}},"MONTH-OVER-MONTH TABLE"),
          h('div',{style:{overflowX:"auto"}},
            h('table',{style:{width:"100%",borderCollapse:"collapse",fontSize:12,fontFamily:F}},
              h('thead',null,h('tr',{style:{background:C.panelAlt}},["Metric","Goal",...MONTH_KEYS.filter(m=>allData[m]).map(m=>m.slice(0,3).toUpperCase())].map(hd=>h('th',{key:hd,style:{padding:"10px 12px",textAlign:"left",color:C.subtext,fontSize:10,textTransform:"uppercase",letterSpacing:"0.08em",borderBottom:`2px solid ${C.border}`,fontFamily:F,whiteSpace:"nowrap"}},hd)))),
              h('tbody',null,
                [{label:"SDS%",key:"sdsTotal",goal:50},{label:"Same Day Starts",key:"totalSameDay",goal:null,isCount:true},{label:"EOM TRC Total",key:"eomTotal",goal:70},{label:"EOM New Denison",key:"eomNewDenison",goal:70},{label:"EOM New G'ville",key:"eomNewGainesville",goal:70},{label:"EOM New Bonham",key:"eomNewBonham",goal:70},{label:"EOM OBS Total",key:"eomObsAll",goal:70},{label:"Exam Show Rate",key:"examKeptAll",goal:null},{label:"Exam Kept Resched",key:"examKeptResched",goal:85},{label:"Total New Exams",key:"totalNewExams",goal:null,isCount:true},{label:"New Exam Kept",key:"newExamKeptAll",goal:85},{label:"New Kept Denison",key:"newExamKeptDenison",goal:85},{label:"New Kept G'ville",key:"newExamKeptGainesville",goal:85},{label:"OBS Kept All",key:"obsKeptAll",goal:85},{label:"OBS Kept Denison",key:"obsKeptDenison",goal:85},{label:"OBS Kept G'ville",key:"obsKeptGainesville",goal:85}]
                .map((row,i)=>h('tr',{key:i,style:{borderBottom:`1px solid ${C.border}`,background:i%2===0?C.panel:C.panelAlt}},
                  h('td',{style:{padding:"9px 12px",color:C.text,fontWeight:600,whiteSpace:"nowrap"}},row.label),
                  h('td',{style:{padding:"9px 12px",color:C.muted}},row.goal?`${row.goal}%`:"—"),
                  ...MONTH_KEYS.filter(m=>allData[m]).map(m=>{
                    const val=allData[m]?.[row.key];
                    const col=(row.goal&&val!=null)?accent(val,row.goal):C.text;
                    return h('td',{key:m,style:{padding:"9px 12px",color:col,fontWeight:row.goal?"700":"400",whiteSpace:"nowrap"}},val!=null?(row.isCount?val:`${val}%`):"—");
                  })
                ))
              )
            )
          )
        )
      )
    ),
    h('div',{style:{padding:"16px 36px",borderTop:`3px solid ${C.royal}`,marginTop:20,background:C.royal}},
      h('p',{style:{color:"#a0bddf",fontSize:10,margin:0,fontFamily:F,letterSpacing:"0.06em"}},`DR. ALYSSA ORTHODONTICS · OUTCOMES DASHBOARD 2026 · LIVE FROM GOOGLE SHEETS${lastRefresh?` · Last refreshed ${lastRefresh.toLocaleString()}`:""}`))
  );
}
ReactDOM.render(h(Dashboard),document.getElementById('root'));
</script>
</body>
</html>
