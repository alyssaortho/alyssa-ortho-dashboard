const pct=v=>{if(!v)return null;const s=String(v).trim();if(s==="-"||s==="—"||s==="")return null;const n=parseFloat(s.replace("%",""));return isNaN(n)?null:n;};
const num=v=>{if(!v)return null;const s=String(v).trim();if(s==="-"||s==="")return null;const n=parseInt(s.replace(/[^0-9.-]/g,""));return isNaN(n)?null:n;};
const norm=s=>String(s||"").trim().toLowerCase().replace(/\s+/g," ");
const accent=(v,g)=>v===100?C.purple:(!g||v>=g?C.blue:C.orange);
const stxt=(v,g)=>{if(!g||v==null)return null;const d=(v-g).toFixed(1);return v>=g?`+${d}% above goal`:`${d}% below goal`;};

function parseCSV(text){
  const rows=[],row=[];let cur="",inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(c==='"'){if(inQ&&text[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
    else if(c===','&&!inQ){row.push(cur);cur="";}
    else if((c==='\n'||c==='\r')&&!inQ){
      row.push(cur);cur="";
      if(row.some(x=>x.trim()))rows.push([...row]);
      row.length=0;
      if(c==='\r'&&text[i+1]==='\n')i++;
    }else cur+=c;
  }
  if(row.length){row.push(cur);if(row.some(x=>x.trim()))rows.push(row);}
  return rows;
}

// Use JSONP-style Google Sheets visualization API to bypass CORS
function fetchSheet(tabName){
  return new Promise((resolve)=>{
    const callbackName='cb_'+Math.random().toString(36).slice(2);
    const script=document.createElement('script');
    const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&tq=select+N,O&sheet=${encodeURIComponent(tabName)}&callback=${callbackName}`;
    let done=false;
    window[callbackName]=(data)=>{
      done=true;
      delete window[callbackName];
      script.remove();
      try{
        // Parse the Google Visualization JSON response
        const rows=data.table.rows;
        // Convert to CSV-like array: each row has cols[13]=N, cols[14]=O
        // But since we only selected N,O the indices are 0 and 1
        const result=rows.map(r=>{
          const n=r.c&&r.c[0]?String(r.c[0].v||""):"";
          const o=r.c&&r.c[1]?String(r.c[1].v||""):"";
          return {label:n.trim(),value:o.trim()};
        }).filter(r=>r.label);
        resolve(result);
      }catch(e){resolve(null);}
    };
    script.onerror=()=>{done=true;delete window[callbackName];script.remove();resolve(null);};
    setTimeout(()=>{if(!done){delete window[callbackName];script.remove();resolve(null);}},8000);
    script.src=url;
    document.head.appendChild(script);
  });
}

function extractMonthData(labelList,hasBonham){
  const labelMap={};
  labelList.forEach(({label,value})=>{const k=norm(label);if(!labelMap[k])labelMap[k]=value;});
  const get=(...cs)=>{
    for(const c of cs){const v=labelMap[norm(c)];if(v!=null)return v;}
    for(const c of cs){
      const words=norm(c).split(" ").filter(w=>w.length>4);if(!words.length)continue;
      const k=Object.keys(labelMap).find(k=>words.every(w=>k.includes(w)));if(k)return labelMap[k];
    }
    return null;
  };
  const TC_DEFS=[{name:"Alex",short:"Alex"},{name:"Sandra Diaz",short:"S.Diaz"},{name:"Sandra Stevens",short:"S.Stevens"},{name:"Ana Ferreria",short:"Ana"},{name:"Maricssa DelToro",short:"Maricssa"}];
  const TC_NAMES=TC_DEFS.map(t=>t.name);
  const tcSds=[],tcTrc=[],tcTable=[];
  TC_DEFS.forEach(({name,short})=>{
    const hdrIdx=labelList.findIndex((r,i)=>norm(r.label)===norm(name)&&(r.value===""||r.value==null)&&i>0);
    if(hdrIdx===-1)return;
    let rec=null,started=null,sdsVal=null,trcVal=null,eom=0,firstConv=false;
    for(let j=hdrIdx+1;j<Math.min(hdrIdx+20,labelList.length);j++){
      const lbl=norm(labelList[j].label),val=labelList[j].value;
      if(TC_NAMES.some(n=>norm(n)===lbl&&labelList[j].value===""))break;
      if(lbl==="total recommended treatment"||lbl==="total recommended treatment ")rec=num(val);
      else if(lbl==="tx started total")started=num(val);
      else if(lbl==="sds conversion %"||lbl==="sds conversion")sdsVal=pct(val);
      else if(lbl==="conversion %"&&!firstConv){sdsVal=pct(val);firstConv=true;}
      else if(lbl==="trc conversion %"||lbl==="trc conversion")trcVal=pct(val);
      else if(lbl.includes("patients converted by eom"))eom=num(val)||0;
    }
    if(rec!==null||started!==null){
      tcSds.push({tc:name,label:short,value:sdsVal??0,goal:50});
      tcTrc.push({tc:name,label:short,value:trcVal??0,goal:70});
      tcTable.push({name,short,rec:rec??0,started:started??0,sds:sdsVal!=null?`${sdsVal.toFixed(1)}%`:"—",eom,trc:trcVal??0});
    }
  });
  const remote=[];
  ["DENISON","GAINESVILLE"].forEach(locU=>{
    const loc=locU.charAt(0)+locU.slice(1).toLowerCase();
    const hdrIdx=labelList.findIndex(r=>norm(r.label).includes("remote conversion")&&norm(r.label).includes(locU.toLowerCase()));
    if(hdrIdx===-1)return;
    let lRec=null,lStart=null,lConv=null;
    for(let j=hdrIdx+1;j<Math.min(hdrIdx+5,labelList.length);j++){
      const lbl=norm(labelList[j].label),val=labelList[j].value;
      if(lbl.includes("total remote exams recommended"))lRec=num(val);
      else if(lbl.includes("remote exams started"))lStart=num(val);
      else if(lbl==="conversion %"&&lConv==null)lConv=pct(val);
    }
    remote.push({location:loc,recommended:lRec??0,started:lStart??0,conversion:lConv??0,goal:70});
  });
  return{
    examKeptAll:pct(get("Exam Kept Rate (All) Both Locations Kept/(Kept+Not Kept)","Exam Kept Rate (All) All Locations Kept/(Kept+Not Kept)")),
    examKeptResched:pct(get("Exam Kept Rate with Reschedules within Same Month")),
    totalNewExams:num(get("Total Number of New Exams")),
    newExamKeptAll:pct(get("New Exam Kept Rate (Both Locations)","New Exam Kept Rate (All Locations)")),
    newExamKeptDenison:pct(get("New Exam Kept Rate - Denison")),
    newExamKeptGainesville:pct(get("New Exam Kept Rate  Gainesville","New Exam Kept Rate - Gainesville")),
    newExamKeptBonham:hasBonham?pct(get("New Exam Kept Rate - Bonham")):null,
    obsKeptAll:pct(get("All OBSERVATION Kept Rate OBS/RR/P2 (Both Locations)","All OBSERVATION Kept Rate OBS/RR/P2 (All Locations)")),
    obsKeptDenison:pct(get("All OBSERVATION Kept Rate OBS/RR/P2 - Denison")),
    obsKeptGainesville:pct(get("All OBSERVATION Kept Rate OBS/RR/P2- Gainesville","All OBSERVATION Kept Rate OBS/RR/P2 - Gainesville")),
    obsKeptBonham:hasBonham?pct(get("All OBSERVATION Kept Rate OBS/RR/P2 - Bonham","All OBSERVATION Kept Rate OBS/RR/P2- Bonham")):null,
    sdsTotal:pct(get("Same Day Conversion (Both Locations)","Same Day Conversion (All Locations)")),sdsGoal:50,
    totalSameDay:num(get("Total Same Day Starts (Both Locations)","Total Same Day Starts (All Locations)")),
    denStarts:num(get("Total Same Day Starts - Denison")),gainStarts:num(get("Total Same Day Starts - Gainesville")),
    bonStarts:hasBonham?num(get("Total Same Day Starts - Bonham")):null,
    eomTotal:pct(get("EOM TRC ALL EXAMS (Both Locations)","EOM TRC ALL EXAMS (All Locations)")),eomTotalGoal:70,
    eomNewDenison:pct(get("EOM New Exams - Denison")),eomNewGainesville:pct(get("EOM New Exams - Gainesville")),
    eomNewBonham:hasBonham?pct(get("EOM New Exams - Bonham")):null,
    eomObsDenison:pct(get("EOM OBS (OBS/RR/P2) - Denison")),eomObsGainesville:pct(get("EOM OBS (OBS/RR/P2) - Gainesville")),
    eomObsBonham:hasBonham?pct(get("EOM OBS (OBS/RR/P2) - Bonham")):null,
    eomNewAll:pct(get("EOM TRC New Exam Conversion (Both Locations)","EOM TRC New Exam Conversion (All Locations)")),
    eomObsAll:pct(get("EOM TRC OBS (OBS/RR/P2) Conversion (Both Locations)","EOM TRC OBS (OBS/RR/P2) Conversion (All Locations)")),
    eomConverted:num(get("# of patients converted at EOM")),
    totalNewCompleted:num(get("Total # of New Exams Completed")),totalObsCompleted:num(get("Total # of Observation (OBS/RR/P2) Appt Completed")),
    newConverted:num(get("Total # of New Exams Converted")),newPending:num(get("Total # of New Exams that went into Pending")),
    newIntoObs:num(get("Total # of New Exams that went into OBS")),obsConverted:num(get("Total # of OBS (OBS/RR/P2) Converted")),
    obsPending:num(get("Total # of OBS (OBS/RR/P2) that went into Pending")),obsStayed:num(get("Total # of OBS (OBS/RR/P2) that stayed in OBS")),
    totalRec:num(get("Total Treatment Recommended from All Exam Types  (NP/OBS/RR/2 + All TCs)")),
    tcSds,tcTrc,tcTable,
    remote:remote.length?remote:[{location:"Denison",recommended:0,started:0,conversion:0,goal:70},{location:"Gainesville",recommended:0,started:0,conversion:0,goal:70}],
    hasBonham,
  };
}

function KpiCard({label,value,goal,large,isCount}){
  const isTbd=value==null;
  const col=isTbd?C.muted:(isCount?C.blue:accent(value,goal));
  const pp=(!isTbd&&!isCount&&goal)?Math.min((value/goal)*100,100):null;
  const sl=(!isTbd&&!isCount&&goal)?stxt(value,goal):null;
  return h('div',{style:{background:C.panel,border:`1px solid ${C.border}`,borderTop:`4px solid ${col}`,borderRadius:10,padding:large?"24px 22px 18px":"18px 20px 14px",display:"flex",flexDirection:"column",gap:5,boxShadow:"0 2px 8px rgba(0,48,135,0.07)"}},
    h('p',{style:{color:C.subtext,fontSize:large?11:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.12em",margin:0,fontFamily:F}},label),
    h('p',{style:{color:col,fontSize:large?52:40,fontWeight:900,margin:0,lineHeight:1,fontFamily:F}},isTbd?"—":isCount?value:`${value}%`),
    !isTbd&&!isCount&&goal&&h('p',{style:{color:C.muted,fontSize:11,margin:0,fontFamily:F}},`Goal ${goal}%`,sl&&h('span',{style:{color:col,marginLeft:8,fontWeight:700}},sl)),
    isTbd&&h('p',{style:{color:C.muted,fontSize:10,margin:0,fontFamily:F}},"No data"),
    pp!=null&&h('div',{style:{height:3,background:C.border,borderRadius:4,marginTop:4,overflow:"hidden"}},h('div',{style:{height:"100%",width:`${pp}%`,background:col,borderRadius:4}}))
  );
}
function MetricTile({label,value,goal}){
  const isTbd=value==null;const col=isTbd?C.muted:accent(value,goal);
  return h('div',{style:{background:C.panelAlt,border:`1px solid ${C.border}`,borderLeft:`3px solid ${col}`,borderRadius:8,padding:"10px 14px",display:"flex",flexDirection:"column",gap:2}},
    h('p',{style:{color:C.muted,fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em",margin:0,fontFamily:F}},label),
    h('p',{style:{color:col,fontSize:22,fontWeight:900,margin:0,lineHeight:1,fontFamily:F}},isTbd?"—":`${value}%`),
    !isTbd&&goal&&stxt(value,goal)&&h('p',{style:{color:col,fontSize:9,margin:0,fontFamily:F}},stxt(value,goal))
  );
}
function GoalBar({data,title,height=240}){
  const goalVal=data.find(d=>d.goal!=null)?.goal??null;
  const CB=(props)=>{const{x,y,width,height:ht,value,goal}=props;return h('rect',{x,y,width,height:Math.max(ht||0,2),fill:(!value||value===0)?C.border:accent(value,goal),rx:3});};
  const CT=({active,payload})=>{if(!active||!payload?.length)return null;const item=payload[0].payload;return h('div',{style:{background:C.panel,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 14px",fontFamily:F,fontSize:12}},h('p',{style:{color:C.text,fontWeight:700,margin:"0 0 4px"}},item.label),item.value?h('p',{style:{color:accent(item.value,item.goal),margin:0,fontWeight:700}},`${item.value}%`):h('p',{style:{color:C.muted,margin:0}},"No data"));};
  return h('div',{style:{background:C.panel,border:`1px solid ${C.border}`,borderRadius:10,padding:"18px 16px 8px",boxShadow:"0 2px 8px rgba(0,48,135,0.07)"}},
    h('p',{style:{color:C.subtext,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.12em",margin:"0 0 12px",fontFamily:F}},title),
    h(ResponsiveContainer,{width:"100%",height},h(BarChart,{data,margin:{top:14,right:14,left:-12,bottom:4}},
      h(CartesianGrid,{strokeDasharray:"3 3",stroke:C.border}),
      h(XAxis,{dataKey:"label",tick:{fill:C.subtext,fontSize:11,fontFamily:F},axisLine:false,tickLine:false}),
      h(YAxis,{tick:{fill:C.subtext,fontSize:11,fontFamily:F},axisLine:false,tickLine:false,tickFormatter:v=>`${v}%`,domain:[0,100]}),
      h(Tooltip,{content:h(CT)}),
      goalVal!=null&&h(ReferenceLine,{y:goalVal,stroke:C.royal,strokeDasharray:"6 3",strokeWidth:2,label:{value:`Goal ${goalVal}%`,position:"insideTopRight",fill:C.royal,fontSize:10,fontFamily:F}}),
      h(Bar,{dataKey:"value",shape:h(CB)})
    ))
  );
}
function Donut({data,title}){
  const total=data.reduce((s,d)=>s+(d.value||0),0);
  if(!total)return h('div',{style:{background:C.panel,border:`1px solid ${C.border}`,borderRadius:10,padding:"18px",boxShadow:"0 2px 8px rgba(0,48,135,0.07)"}},h('p',{style:{color:C.subtext,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.12em",margin:"0 0 4px",fontFamily:F}},title),h('p',{style:{color:C.muted,padding:"40px 0",textAlign:"center",fontFamily:F}},"No data"));
  const R=Math.PI/180;
  const rl=({cx,cy,midAngle,outerRadius,value,name})=>{const r=outerRadius+38,x=cx+r*Math.cos(-midAngle*R),y=cy+r*Math.sin(-midAngle*R);return h('text',{textAnchor:x>cx?"start":"end",fill:C.subtext,fontSize:10,fontFamily:F},h('tspan',{x,y:y-6},name),h('tspan',{x,dy:14,fontWeight:"700",fill:C.text},`${value} (${((value/total)*100).toFixed(0)}%)`));};
  return h('div',{style:{background:C.panel,border:`1px solid ${C.border}`,borderRadius:10,padding:"18px 10px 8px",boxShadow:"0 2px 8px rgba(0,48,135,0.07)"}},
    h('p',{style:{color:C.subtext,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.12em",margin:"0 0 4px",fontFamily:F}},title),
    h('p',{style:{color:C.muted,fontSize:11,margin:"0 0 4px",fontFamily:F}},`Total: ${total}`),
    h(ResponsiveContainer,{width:"100%",height:280},h(PieChart,{margin:{top:20,right:44,left:44,bottom:20}},
      h(Pie,{data,cx:"50%",cy:"50%",innerRadius:52,outerRadius:76,paddingAngle:3,dataKey:"value",label:rl,labelLine:{stroke:C.border,strokeWidth:1}},data.map((e,i)=>h(Cell,{key:i,fill:e.color||C.blue}))),
      h(Tooltip,{contentStyle:{background:C.panel,border:`1px solid ${C.border}`,borderRadius:8,fontFamily:F,fontSize:12}})
    ))
  );
}
function TrendBar({allData,metricKey,goal,label,isCount}){
  const loaded=MONTH_KEYS.filter(m=>allData[m]);
  const data=loaded.map(m=>({label:m.slice(0,3),value:allData[m][metricKey]??null,goal})).filter(d=>d.value!=null);
  if(!data.length)return null;
  return h('div',{style:{background:C.panel,border:`1px solid ${C.border}`,borderRadius:10,padding:"14px 16px 8px",boxShadow:"0 2px 8px rgba(0,48,135,0.07)"}},
    h('p',{style:{color:C.muted,fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.12em",margin:"0 0 8px",fontFamily:F}},`${label} — TREND`),
    h(ResponsiveContainer,{width:"100%",height:90},h(BarChart,{data,margin:{top:4,right:4,left:-22,bottom:0}},
      h(XAxis,{dataKey:"label",tick:{fill:C.muted,fontSize:9,fontFamily:F},axisLine:false,tickLine:false}),
      h(YAxis,{domain:isCount?["auto","auto"]:[0,100],hide:true}),
      h(Tooltip,{contentStyle:{background:C.panel,border:`1px solid ${C.border}`,borderRadius:6,fontFamily:F,fontSize:11},formatter:v=>[isCount?v:`${v}%`]}),
      goal&&h(ReferenceLine,{y:goal,stroke:C.royal,strokeDasharray:"4 2",strokeWidth:1}),
      h(Bar,{dataKey:"value",radius:2},data.map((d,i)=>h(Cell,{key:i,fill:goal?accent(d.value,goal):C.blue})))
    ))
  );
}

const SECTIONS=[{id:"overview",label:"KPIs"},{id:"tc",label:"TC Performance"},{id:"exams",label:"Exam Outcomes"},{id:"trends",label:"Trends"}];
function SH({label,color,month}){return h('div',{style:{display:"flex",alignItems:"center",gap:12,marginBottom:24}},h('div',{style:{width:4,height:28,background:color,borderRadius:4}}),h('h2',{style:{margin:0,fontSize:15,color:C.text,letterSpacing:"0.1em",textTransform:"uppercase",fontWeight:900,fontFamily:F}},label),h('span',{style:{color:C.muted,fontSize:12,fontFamily:F,marginLeft:4}},`— ${month} 2026`));}

function Dashboard(){
  const [month,setMonth]=useState("May");
  const [section,setSection]=useState("overview");
  const [allData,setAllData]=useState({});
  const [loading,setLoading]=useState(true);
  const [loadMsg,setLoadMsg]=useState("Connecting to Google Sheet…");
  const [lastRefresh,setLastRefresh]=useState(null);
  const [error,setError]=useState(null);

  const loadAll=useCallback(async()=>{
    setLoading(true);setError(null);
    const results={};
    let count=0;
    // Load sequentially with progress updates to avoid overwhelming JSONP
    for(const {key,tab,hasBonham} of SHEET_TABS){
      setLoadMsg(`Loading ${key}… (${++count}/12)`);
      try{
        const data=await fetchSheet(tab);
        if(data&&data.length>5){
          results[key]=extractMonthData(data,hasBonham);
        }
      }catch(e){}
    }
    setAllData(results);setLastRefresh(new Date());setLoading(false);
    const loaded=MONTH_KEYS.filter(m=>results[m]);
    if(loaded.length)setMonth(loaded[loaded.length-1]);
    else setError("Could not load data. Check your internet connection and make sure the Google Sheet is shared publicly.");
  },[]);

  useEffect(()=>{loadAll();},[]);
  const d=allData[month];
  const lc=Object.keys(allData).length;

  return h('div',{style:{background:C.bg,minHeight:"100vh",fontFamily:F}},
    h('div',{style:{background:`linear-gradient(135deg,${C.royal} 0%,#001a4d 100%)`,borderBottom:`3px solid ${C.orange}`,padding:"20px 36px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}},
      h('div',null,
        h('h1',{style:{margin:0,fontSize:22,fontWeight:900,color:C.white,letterSpacing:"0.08em",textTransform:"uppercase",fontFamily:F}},"◈ Outcomes Dashboard"),
        h('p',{style:{margin:"4px 0 0",color:"#a0bddf",fontSize:11,letterSpacing:"0.06em",fontFamily:F}},"Dr. Alyssa Orthodontics · 2026 · Denison · Gainesville · Bonham")
      ),
      h('div',{style:{display:"flex",gap:12,alignItems:"center"}},
        loading?h('span',{style:{color:"#a0bddf",fontSize:12,fontFamily:F}},`⟳ ${loadMsg}`):
        h(Fragment,null,
          h('span',{style:{width:9,height:9,borderRadius:"50%",background:lc?C.teal:C.orange,display:"inline-block",boxShadow:lc?`0 0 10px ${C.teal}`:"none"}}),
          h('span',{style:{color:lc?C.teal:C.orange,fontSize:13,fontWeight:700,fontFamily:F}},lc?`LIVE — ${lc} months`:"OFFLINE"),
          lastRefresh&&h('span',{style:{color:"#a0bddf",fontSize:10,fontFamily:F}},lastRefresh.toLocaleTimeString()),
          h('button',{onClick:loadAll,style:{background:"none",border:"1px solid #a0bddf",color:"#a0bddf",borderRadius:6,padding:"5px 12px",fontSize:11,fontFamily:F}},"↻ Refresh")
        )
      )
